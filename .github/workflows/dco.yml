name: DCO

# Enforce that every commit in a pull request is signed off with a
# `Signed-off-by:` trailer (Developer Certificate of Origin 1.1).
# See CONTRIBUTING.md → "Developer Certificate of Origin (DCO)".

on:
  pull_request:

permissions:
  contents: read

jobs:
  dco-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Need the full PR commit range, not just the tip.
          fetch-depth: 0

      - name: Verify Signed-off-by on every commit
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          missing=0
          # Each commit in the PR range that is NOT a merge commit must carry a
          # Signed-off-by line (merges have no authored content to certify).
          for sha in $(git rev-list --no-merges "$BASE_SHA".."$HEAD_SHA"); do
            if git show -s --format=%B "$sha" | grep -qiE '^Signed-off-by: .+ <.+@.+>$'; then
              echo "ok    $sha $(git show -s --format=%s "$sha")"
            else
              echo "MISS  $sha $(git show -s --format=%s "$sha")"
              missing=1
            fi
          done
          if [ "$missing" -ne 0 ]; then
            echo
            echo "::error::One or more commits are missing a 'Signed-off-by' line."
            echo "Sign off your commits with 'git commit -s' (or amend the last with"
            echo "'git commit --amend -s --no-edit') and force-push. See CONTRIBUTING.md."
            exit 1
          fi
          echo "All commits are signed off."
