# release-please keeps a rolling "release PR" up to date from Conventional
# Commits on main. The flow:
#
#   1. Merge Conventional Commits (feat:, fix:, ...) to main.
#   2. This workflow opens/updates a release PR that bumps the version in the
#      package.json files + CHANGELOG, driven by .github/release-please-config.json
#      and .github/.release-please-manifest.json.
#   3. Merging that release PR creates a GitHub Release and a plain `vX.Y.Z` git
#      tag (include-component-in-tag: false).
#   4. The `publish` job below then calls release.yml (a reusable workflow) to
#      build and push the multi-arch image to GHCR.
#
# We invoke release.yml directly rather than relying on its `on: push: tags`
# trigger because tags created with the default GITHUB_TOKEN do NOT start new
# workflow runs. (Hand-cut `v*.*.*` tags still trigger release.yml on their own.)
#
# So: a normal feat/fix commit -> (merge release PR) -> tag + release -> image.
name: release-please

# ⚠️ DEFERRED to M6 (v1.0 release). Set to manual-only (workflow_dispatch) so it
# does NOT run on every push to main: pre-v1.0 we aren't cutting releases, and on
# push it failed (and emailed) at the PR-creation step. To RE-ENABLE for v1.0:
#   1. Restore the `push: { branches: [main] }` trigger below (replace workflow_dispatch).
#   2. Repo Settings → Actions → General → Workflow permissions → enable
#      "Allow GitHub Actions to create and approve pull requests"
#      (API: gh api -X PUT repos/<owner>/<repo>/actions/permissions/workflow
#            -F can_approve_pull_request_reviews=true). Without this, release-please
#      cannot open its PR and the run fails.
#   3. The manifest starts at the 0.0.0 sentinel, which makes release-please propose
#      1.0.0; set .github/.release-please-manifest.json to the intended starting
#      version (e.g. "0.1.0") unless you really are cutting v1.0.
on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: .github/release-please-config.json
          manifest-file: .github/.release-please-manifest.json

  # Build + publish the image for the freshly tagged release.
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/release.yml
    with:
      tag: ${{ needs.release-please.outputs.tag_name }}
