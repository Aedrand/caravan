name: Release

# Builds + publishes the multi-arch image. Two entry points:
#   - push of a `v*.*.*` tag (e.g. a hand-cut tag), and
#   - workflow_call from release-please.yml when it cuts a release. The reusable
#     call is needed because tags created by release-please's GITHUB_TOKEN do not
#     re-trigger `on: push: tags`; calling this workflow runs the build directly.
on:
  push:
    tags: ["v*.*.*"]
  workflow_call:
    inputs:
      tag:
        description: Release tag to build (e.g. v1.2.3)
        required: true
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On workflow_call the tag isn't the triggering ref, so check it out.
          ref: ${{ inputs.tag || github.ref }}
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}},value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{major}}.{{minor}},value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=semver,pattern={{major}},value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
