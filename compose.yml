# Caravan reference deployment (TD-4): one service, one volume.
#
#   docker compose up -d        → http://localhost:3000
#
# Pin the image tag (e.g. :v1.2.3) for stability; `latest` floats.
services:
  caravan:
    image: ghcr.io/aedrand/caravan:latest
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - caravan-data:/app/data
    environment:
      # Full public URL — set when serving behind a reverse proxy / domain.
      BASE_URL: "http://localhost:3000"
      # Optional: pre-seed the admin account on first boot.
      # ADMIN_EMAIL: ""
      # ADMIN_PASSWORD: ""
      # Optional: opt-in continuous backup to object storage via Litestream.
      # Uncomment + set a replica URL and credentials. See docs/self-hosting/backups.md.
      # LITESTREAM_REPLICA_URL: "s3://my-bucket/caravan"   # or Backblaze B2, MinIO, Tigris…
      # AWS_ACCESS_KEY_ID: ""
      # AWS_SECRET_ACCESS_KEY: ""

volumes:
  caravan-data:
